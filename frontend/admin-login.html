<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小C助手 · 管理员登录</title>
  <link rel="icon" type="image/png" href="./favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-bg-page">
  <div class="auth-corner">
    <a class="link-btn" href="./login.html">用户登录</a>
  </div>
  <main class="auth-page">
    <section class="auth-card">
      <h1>管理员登录</h1>
      <p>仅管理员可进入知识上传页。</p>

      <div class="xc-endpoint-fields" aria-hidden="true">
        <label>
          API 基地址
          <input id="apiBase" value="http://127.0.0.1:8000" autocomplete="off" />
        </label>
      </div>
      <label>
        管理员用户名
        <input id="username" placeholder="默认 admin">
      </label>
      <label class="auth-password-field">
        密码
        <div class="auth-password-wrap">
          <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
          <button
            type="button"
            id="togglePasswordBtn"
            class="auth-password-toggle"
            aria-label="显示密码"
            aria-pressed="false"
          >
            <span class="auth-password-toggle__icons" aria-hidden="true">
              <svg
                class="auth-password-icon auth-password-icon--show"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.65"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"
                />
                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
              </svg>
              <svg
                class="auth-password-icon auth-password-icon--hide"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.65"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 0 1-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
            </span>
          </button>
        </div>
      </label>

      <div class="btn-row btn-row--center-half">
        <button id="loginBtn" class="btn" type="button">登录</button>
      </div>
      <p id="hint" class="hint"></p>
    </section>
  </main>
  <script src="./theme.js"></script>
  <script src="./common.js"></script>
  <script src="./admin-login.js"></script>
</body>
</html>
