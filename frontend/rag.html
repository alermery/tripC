<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小C助手 · RAG 知识上传</title>
  <link rel="icon" type="image/png" href="./favicon.ico">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-bg-page">
  <div class="auth-corner">
    <a class="link-btn" href="./index.html">对话首页</a>
    <a class="link-btn" href="#" id="logoutAdmin">退出管理</a>
  </div>
  <main class="auth-page rag-page">
    <section class="auth-card rag-card">
      <h1>知识库上传</h1>
      <p class="rag-intro">
        支持 <strong>txt</strong>、<strong>csv</strong>、<strong>xlsx</strong>（单文件不超过 25MB）。系统按内容自动分流：
        <br />· <strong>套餐表</strong>请严格按照含详情、出发地、价格、优惠列格式→ 写入 <strong>Neo4j</strong> 套餐图谱并同步 <strong>Chroma travel_deals</strong>；
        <br />· <strong>其它表格或纯文本</strong> → 切块写入 <strong>Chroma rag_kb</strong>，由规划智能体的 <code>rag_kb_retriever</code> 检索。
      </p>

      <!-- 仍参与逻辑与默认值，仅不在界面展示 -->
      <div class="xc-endpoint-fields" aria-hidden="true">
        <label>
          API 基地址
          <input id="apiBase" value="http://127.0.0.1:8000" autocomplete="off" />
        </label>
      </div>
      <label class="rag-file-label">
        选择文件
        <input id="fileInput" type="file" multiple accept=".txt,.csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,text/csv,text/plain">
      </label>
      <div class="btn-row">
        <button id="uploadBtn" class="btn" type="button">上传并处理</button>
      </div>
      <div id="result" class="rag-result" aria-live="polite"></div>
    </section>
  </main>
  <script src="./theme.js"></script>
  <script>
    const apiBaseInput = document.getElementById("apiBase");
    const fileInput = document.getElementById("fileInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const resultEl = document.getElementById("result");
    const logoutAdmin = document.getElementById("logoutAdmin");
    const XC_DEFAULT_API_BASE = "http://127.0.0.1:8000";

    function getApiBase() {
      const raw =
        (apiBaseInput && apiBaseInput.value.trim()) ||
        localStorage.getItem("xc_api_base") ||
        XC_DEFAULT_API_BASE;
      return raw.replace(/\/$/, "");
    }

    const token = localStorage.getItem("xc_admin_token");
    if (!token) {
      window.location.replace("./admin-login.html");
    }

    if (apiBaseInput && localStorage.getItem("xc_api_base")) {
      apiBaseInput.value = localStorage.getItem("xc_api_base");
    }

    logoutAdmin.addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("xc_admin_token");
      window.location.href = "./admin-login.html";
    });

    function formatUploadResult(data) {
      let output = `上传日志结果\n`;
      output += `════════════════════\n\n`;
      output += `文件名：${data.filename || '未知'}\n`;
      output += `上传者：${data.uploaded_by || 'admin'}\n\n`;

      if (data.message) {
        output += `摘要：${data.message}\n\n`;
      }

      output += `处理目标：\n`;
      (data.targets || []).forEach((target) => {
        output += `  • ${target}\n`;
      });
      output += `\n`;

      output += `处理统计：\n`;
      output += `  • Neo4j TravelDetail  upserts: ${data.neo4j_upserts || 0} 条\n`;
      output += `  • Chroma travel_deals docs: ${data.chroma_travel_deals_docs || 0} 条\n`;
      output += `  • Chroma rag_kb docs: ${data.chroma_rag_kb_docs || 0} 条\n\n`;

      if (data.stats && data.stats.total_rows !== undefined) {
        output += `数据统计：总 ${data.stats.total_rows} 行，有效处理 ${data.stats.processed || 0} 条\n`;
        if (data.stats.skipped_price > 0 || data.stats.skipped_missing > 0) {
          output += `  跳过价格解析: ${data.stats.skipped_price} 行\n`;
          output += `  跳过缺失字段: ${data.stats.skipped_missing} 行\n`;
        }
        output += `\n`;
      }

      if (data.notes && data.notes.length > 0) {
        output += `详细说明：\n`;
        data.notes.forEach((note, i) => {
          output += `  ${i + 1}. ${note}\n`;
        });
        output += `\n`;
      }

      const rowTotal =
        (data.neo4j_upserts || 0) +
        (data.chroma_travel_deals_docs || 0) +
        (data.chroma_rag_kb_docs || 0);
      let statusLine;
      if (rowTotal > 0) {
        statusLine = '[成功] 已导入数据';
      } else if (data.notes && data.notes.some((n) => /Chroma|Ollama|向量/i.test(String(n)))) {
        statusLine =
          '[警告] 完成但未写入有效数据（请检查 Ollama / nomic-embed-text 与 Chroma）';
      } else {
        statusLine = '[提示] 完成但无有效数据导入';
      }
      output += `状态：${statusLine}\n`;
      return output;
    }

    function styleResultBox() {
      resultEl.style.whiteSpace = "pre-wrap";
      resultEl.style.fontFamily = "monospace";
      resultEl.style.backgroundColor = "#f8fafc";
      resultEl.style.padding = "15px";
      resultEl.style.borderRadius = "6px";
      resultEl.style.border = "1px solid #e2e8f0";
    }

    function showStatus(text, color = "#3b82f6") {
      styleResultBox();
      resultEl.style.color = color;
      resultEl.textContent = text;
    }

    async function readResponseJson(response) {
      const text = await response.text();
      if (!text.trim()) return {};
      try {
        return JSON.parse(text);
      } catch {
        return { _notJson: true, _raw: text.slice(0, 2000) };
      }
    }

    function formatApiError(data) {
      if (!data) return "请求失败";
      if (data._notJson) return data._raw || "服务端返回了非 JSON 内容";
      if (typeof data.detail === "string") return data.detail;
      if (Array.isArray(data.detail)) {
        return data.detail
          .map((item) => (item && item.msg ? item.msg : JSON.stringify(item)))
          .join("；");
      }
      return data.message || data.error || JSON.stringify(data);
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function pollUploadTask(base, taskId) {
      for (let attempt = 1; attempt <= 180; attempt += 1) {
        await sleep(1000);
        const response = await fetch(`${base}/admin/rag/tasks/${encodeURIComponent(taskId)}`, {
          headers: { Authorization: "Bearer " + token },
        });
        const data = await readResponseJson(response);
        if (!response.ok) {
          throw new Error(`任务查询失败 ${response.status}: ${formatApiError(data)}`);
        }
        if (data.status === "completed") {
          return data.result || {};
        }
        if (data.status === "failed") {
          throw new Error(data.error || "后台处理失败");
        }
        showStatus(`文件已上传，后台处理中...\n任务 ID：${taskId}\n已等待：${attempt} 秒`);
      }
      throw new Error("后台处理仍未完成，请稍后刷新页面或查看后端日志。");
    }

    async function uploadSingleFile(base, file, index, total) {
      const fd = new FormData();
      fd.append("file", file);
      const response = await fetch(`${base}/admin/rag/upload`, {
        method: "POST",
        headers: { Authorization: "Bearer " + token },
        body: fd,
      });
      const data = await readResponseJson(response);
      if (!response.ok) {
        const msg = formatApiError(data);
        throw new Error(`${file.name}: ${response.status} ${msg}`);
      }
      const finalResult = data.task_id ? await pollUploadTask(base, data.task_id) : data;
      return `【${index + 1}/${total}】${file.name}\n${formatUploadResult(finalResult)}`;
    }

    uploadBtn.addEventListener("click", async () => {
      const base = getApiBase();
      const files = Array.from(fileInput.files || []);
      if (!files.length) {
        resultEl.innerHTML = "<p style='color: #f59e0b;'>请先选择文件。</p>";
        return;
      }
      localStorage.setItem("xc_api_base", base);
      uploadBtn.disabled = true;
      showStatus(`上传处理中... 共 ${files.length} 个文件`);
      try {
        const outputs = [];
        for (let i = 0; i < files.length; i += 1) {
          showStatus(`上传处理中... ${i + 1}/${files.length}\n${files[i].name}`);
          outputs.push(await uploadSingleFile(base, files[i], i, files.length));
        }
        resultEl.textContent = outputs.join("\n\n----------------------------------------\n\n");
        resultEl.style.color = "";
        styleResultBox();
      } catch (err) {
        const message = err && err.message ? String(err.message) : String(err);
        let hint = "";
        if (/\b401\b|\b403\b/.test(message)) {
          localStorage.removeItem("xc_admin_token");
          hint = "\n\n请重新在管理员登录页获取令牌。";
        }
        showStatus(`请求失败: ${message}${hint}`, "#ef4444");
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
